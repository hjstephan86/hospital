<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Patientenverwaltung</title>
<style>
  :root {
    --bg: #f4f6f9; --card: #fff; --primary: #2563eb;
    --border: #e2e8f0; --text: #1e293b; --muted: #64748b;
    --row-hover: #f0f6ff; --active: #dcfce7; --discharged: #fef9c3;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }

  header {
    background: var(--primary); color: #fff;
    padding: 14px 24px; display: flex;
    align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,.15);
  }
  header h1 { font-size: 1.15rem; font-weight: 600; }

  .toolbar {
    padding: 14px 24px; background: var(--card);
    border-bottom: 1px solid var(--border);
    display: flex; gap: 12px; align-items: center;
    position: sticky; top: 53px; z-index: 99;
  }
  #searchInput {
    flex: 1; padding: 9px 14px; border: 1.5px solid var(--border);
    border-radius: 8px; font-size: .95rem; outline: none;
    transition: border-color .2s;
  }
  #searchInput:focus { border-color: var(--primary); }
  #resultInfo { font-size: .82rem; color: var(--muted); white-space: nowrap; }

  .btn {
    padding: 8px 16px; border: none; border-radius: 8px;
    cursor: pointer; font-size: .88rem; font-weight: 500;
    background: var(--primary); color: #fff; transition: opacity .15s;
  }
  .btn:hover { opacity: .87; }
  .btn-sm { padding: 4px 10px; font-size: .8rem; }
  .btn-danger { background: #ef4444; }
  .btn-warning { background: #f59e0b; }

  /* ---- virtuelles Scrolling ---- */
  #scrollContainer {
    overflow-y: auto;
    height: calc(100vh - 110px);
    position: relative;
  }
  #virtualSpacer { width: 100%; }
  #visibleRows { position: absolute; left: 0; right: 0; }

  table { width: 100%; border-collapse: collapse; font-size: .87rem; }
  thead th {
    background: #f8fafc; position: sticky; top: 0; z-index: 10;
    padding: 10px 12px; text-align: left; font-weight: 600;
    border-bottom: 2px solid var(--border); white-space: nowrap;
  }
  tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
  tbody tr:hover { background: var(--row-hover); }
  td { padding: 8px 12px; vertical-align: middle; }
  td.actions { white-space: nowrap; }

  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 99px;
    font-size: .75rem; font-weight: 600;
  }
  .badge-active   { background: #dcfce7; color: #166534; }
  .badge-discharged { background: #fef9c3; color: #854d0e; }
  .badge-deceased { background: #fee2e2; color: #991b1b; }
  .badge-epa-active  { background: #dbeafe; color: #1d4ed8; }
  .badge-epa-pending { background: #f3f4f6; color: #374151; }
  .badge-epa-revoked { background: #fce7f3; color: #9d174d; }

  /* ---- Modal ---- */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.45); z-index: 200;
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--card); border-radius: 12px;
    padding: 28px; width: min(620px, 96vw);
    max-height: 90vh; overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,.25);
  }
  .modal h2 { font-size: 1.05rem; margin-bottom: 18px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-grid .full { grid-column: 1/-1; }
  label { display: block; font-size: .8rem; font-weight: 600; margin-bottom: 4px; color: var(--muted); }
  input, select, textarea {
    width: 100%; padding: 7px 10px; border: 1.5px solid var(--border);
    border-radius: 6px; font-size: .88rem; outline: none;
    transition: border-color .2s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--primary); }
  .modal-footer { margin-top: 20px; display: flex; gap: 10px; justify-content: flex-end; }
  .btn-outline {
    background: transparent; border: 1.5px solid var(--border);
    color: var(--text); padding: 8px 16px; border-radius: 8px;
    cursor: pointer; font-size: .88rem;
  }
  .toast {
    position: fixed; bottom: 20px; right: 20px; z-index: 300;
    background: #1e293b; color: #fff; padding: 10px 18px;
    border-radius: 8px; font-size: .88rem; opacity: 0;
    transition: opacity .3s; pointer-events: none;
  }
  .toast.show { opacity: 1; }
  .loading { padding: 40px; text-align: center; color: var(--muted); }
</style>
</head>
<body>

<header>
  <h1>🏥 Patientenverwaltung</h1>
  <button class="btn" onclick="openModal()">+ Neuer Patient</button>
</header>

<div class="toolbar">
  <input id="searchInput" type="text"
    placeholder="Name, Patientennr., Versicherungsnr. …"
    autocomplete="off" spellcheck="false"/>
  <span id="resultInfo">Lade …</span>
</div>

<div id="scrollContainer">
  <div id="virtualSpacer">
    <table>
      <thead>
        <tr>
          <th>Pat.-Nr.</th><th>Name</th><th>Geburtsdatum</th>
          <th>Versicherungsnr.</th><th>Blutgruppe</th>
          <th>Status</th><th>EPA</th><th>Aktionen</th>
        </tr>
      </thead>
    </table>
    <div id="visibleRows"></div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <h2 id="modalTitle">Neuer Patient</h2>
    <div class="form-grid">
      <div><label>Patientennr.</label><input id="fPatientNumber" placeholder="P-000001"/></div>
      <div><label>Blutgruppe</label>
        <select id="fBlutgruppe">
          <option value="">—</option>
          <option>A+</option><option>A-</option><option>B+</option><option>B-</option>
          <option>AB+</option><option>AB-</option><option>0+</option><option>0-</option>
        </select>
      </div>
      <div><label>Vorname *</label><input id="fVorname"/></div>
      <div><label>Nachname *</label><input id="fNachname"/></div>
      <div><label>Geburtsdatum *</label><input id="fGeburtsdatum" type="date"/></div>
      <div><label>Geschlecht</label>
        <select id="fGeschlecht">
          <option value="">—</option>
          <option>männlich</option><option>weiblich</option><option>divers</option>
        </select>
      </div>
      <div><label>Versicherungsnr.</label><input id="fVersicherungsnr"/></div>
      <div><label>Status</label>
        <select id="fStatus">
          <option value="active">Aktiv</option>
          <option value="discharged">Entlassen</option>
          <option value="deceased">Verstorben</option>
        </select>
      </div>
      <div><label>EPA-Status</label>
        <select id="fEpaStatus">
          <option value="pending">Ausstehend</option>
          <option value="active">Aktiv</option>
          <option value="revoked">Widerrufen</option>
        </select>
      </div>
      <div><label>Telefon</label><input id="fTelefon"/></div>
      <div class="full"><label>E-Mail</label><input id="fEmail" type="email"/></div>
      <div class="full"><label>Adresse</label><input id="fAdresse"/></div>
      <div class="full"><label>Notfallkontakt</label><input id="fNotfallkontakt"/></div>
      <div class="full"><label>Allergien</label><textarea id="fAllergien" rows="2"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn-outline" onclick="closeModal()">Abbrechen</button>
      <button class="btn" onclick="savePatient()">Speichern</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '/api/patients';
const ROW_H = 42;          // px pro Zeile (geschätzt)
const BUFFER = 5;          // Puffer-Zeilen oben/unten
let allData = [];
let editId = null;
let debounceTimer = null;

// ── Virtuelle Tabelle ──────────────────────────────────────
const scrollEl   = document.getElementById('scrollContainer');
const spacerEl   = document.getElementById('virtualSpacer');
const rowsEl     = document.getElementById('visibleRows');

function renderVisible() {
  const scrollTop    = scrollEl.scrollTop;
  const clientHeight = scrollEl.clientHeight;
  const total        = allData.length;

  const startIdx = Math.max(0, Math.floor(scrollTop / ROW_H) - BUFFER);
  const endIdx   = Math.min(total, Math.ceil((scrollTop + clientHeight) / ROW_H) + BUFFER);

  rowsEl.style.transform = `translateY(${startIdx * ROW_H}px)`;
  spacerEl.style.height  = `${total * ROW_H + 46}px`; // +thead

  let html = '<table><tbody>';
  for (let i = startIdx; i < endIdx; i++) {
    const p = allData[i];
    const name = `${p.nachname}, ${p.vorname}`;
    const geb  = p.geburtsdatum ? p.geburtsdatum.substring(0, 10) : '—';
    html += `<tr>
      <td>${p.patientNumber ?? '—'}</td>
      <td>${name}</td>
      <td>${geb}</td>
      <td>${p.versicherungsnr ?? '—'}</td>
      <td>${p.blutgruppe ?? '—'}</td>
      <td><span class="badge badge-${p.status}">${statusLabel(p.status)}</span></td>
      <td><span class="badge badge-epa-${p.epaStatus}">${epaLabel(p.epaStatus)}</span></td>
      <td class="actions">
        <button class="btn btn-sm btn-warning" onclick="editPatient(${p.id})">✏</button>
        <button class="btn btn-sm btn-danger"  onclick="deletePatient(${p.id})">🗑</button>
      </td>
    </tr>`;
  }
  html += '</tbody></table>';
  rowsEl.innerHTML = html;
}

scrollEl.addEventListener('scroll', renderVisible);
window.addEventListener('resize', renderVisible);

function statusLabel(s) {
  return {active:'Aktiv', discharged:'Entlassen', deceased:'Verstorben'}[s] ?? s;
}
function epaLabel(s) {
  return {active:'Aktiv', pending:'Ausstehend', revoked:'Widerrufen'}[s] ?? s;
}

// ── Daten laden ────────────────────────────────────────────
async function loadRandom() {
  showInfo('Lade …');
  try {
    const r = await fetch(`${API}/random?limit=30`);
    allData = await r.json();
    showInfo(`${allData.length} zufällige Patienten angezeigt`);
    renderVisible();
  } catch(e) { showInfo('Fehler beim Laden'); }
}

async function search(q) {
  showInfo('Suche …');
  try {
    const url = q ? `${API}/search?q=${encodeURIComponent(q)}` : `${API}/random?limit=30`;
    const r = await fetch(url);
    allData = await r.json();
    const cnt = allData.length;
    showInfo(q
      ? `${cnt > 500 ? 'Mehr als 500' : cnt} Ergebnis${cnt !== 1 ? 'se' : ''}`
      : `${cnt} zufällige Patienten angezeigt`
    );
    scrollEl.scrollTop = 0;
    renderVisible();
  } catch(e) { showInfo('Fehler bei der Suche'); }
}

document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(debounceTimer);
  // Client-seitiger Sofortfilter auf bereits geladenen Daten
  const q = e.target.value.trim().toLowerCase();
  if (!q) { loadRandom(); return; }
  debounceTimer = setTimeout(() => search(e.target.value.trim()), 300);
});

function showInfo(t) { document.getElementById('resultInfo').textContent = t; }

// ── Modal ──────────────────────────────────────────────────
function openModal(data = null) {
  editId = data ? data.id : null;
  document.getElementById('modalTitle').textContent = data ? 'Patient bearbeiten' : 'Neuer Patient';
  document.getElementById('fPatientNumber').value = data?.patientNumber ?? '';
  document.getElementById('fVorname').value        = data?.vorname ?? '';
  document.getElementById('fNachname').value       = data?.nachname ?? '';
  document.getElementById('fGeburtsdatum').value   = data?.geburtsdatum?.substring(0,10) ?? '';
  document.getElementById('fGeschlecht').value     = data?.geschlecht ?? '';
  document.getElementById('fVersicherungsnr').value= data?.versicherungsnr ?? '';
  document.getElementById('fBlutgruppe').value     = data?.blutgruppe ?? '';
  document.getElementById('fStatus').value         = data?.status ?? 'active';
  document.getElementById('fEpaStatus').value      = data?.epaStatus ?? 'pending';
  document.getElementById('fTelefon').value        = data?.telefon ?? '';
  document.getElementById('fEmail').value          = data?.email ?? '';
  document.getElementById('fAdresse').value        = data?.adresse ?? '';
  document.getElementById('fNotfallkontakt').value = data?.notfallkontakt ?? '';
  document.getElementById('fAllergien').value      = data?.allergien ?? '';
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function closeModalOutside(e) { if (e.target.id==='modalOverlay') closeModal(); }

async function savePatient() {
  const body = {
    patientNumber: document.getElementById('fPatientNumber').value,
    vorname:       document.getElementById('fVorname').value,
    nachname:      document.getElementById('fNachname').value,
    geburtsdatum:  document.getElementById('fGeburtsdatum').value || null,
    geschlecht:    document.getElementById('fGeschlecht').value,
    versicherungsnr: document.getElementById('fVersicherungsnr').value,
    blutgruppe:    document.getElementById('fBlutgruppe').value,
    status:        document.getElementById('fStatus').value,
    epaStatus:     document.getElementById('fEpaStatus').value,
    telefon:       document.getElementById('fTelefon').value,
    email:         document.getElementById('fEmail').value,
    adresse:       document.getElementById('fAdresse').value,
    notfallkontakt: document.getElementById('fNotfallkontakt').value,
    allergien:     document.getElementById('fAllergien').value,
  };
  if (!body.vorname || !body.nachname || !body.geburtsdatum) {
    toast('Bitte Vorname, Nachname und Geburtsdatum angeben.'); return;
  }
  try {
    const url    = editId ? `${API}/${editId}` : API;
    const method = editId ? 'PUT' : 'POST';
    const r = await fetch(url, {
      method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
    });
    if (!r.ok) throw new Error();
    toast(editId ? 'Patient aktualisiert.' : 'Patient angelegt.');
    closeModal();
    search(document.getElementById('searchInput').value.trim());
  } catch { toast('Fehler beim Speichern.'); }
}

async function editPatient(id) {
  const r = await fetch(`${API}/${id}`);
  const p = await r.json();
  openModal(p);
}

async function deletePatient(id) {
  if (!confirm('Patient wirklich löschen?')) return;
  await fetch(`${API}/${id}`, { method: 'DELETE' });
  toast('Patient gelöscht.');
  search(document.getElementById('searchInput').value.trim());
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
}

// ── Start ──────────────────────────────────────────────────
loadRandom();
</script>
</body>
</html>
